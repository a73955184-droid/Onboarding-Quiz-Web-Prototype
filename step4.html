<span class="font-label-md text-label-md mr-2">Continue</span>
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>

<script>
    // Archetype Score Mapping
    const archetypeMapping = {
        "Passive": { GD: 3, IP: 1 },
        "Rebalancer": { GD: 2, FT: 1 },
        "Strategic": { FT: 2, TO: 1 },
        "Community-driven": { GA: 1, TO: 2 },
        "Analytical": { FT: 2, GD: 1 },
        "Explorer": { GA: 2, TO: 1 },
        "Experimental": { GA: 1, FT: 1 },
        "Structured": { FT: 2, BFO: 1 }
    };

    function getUrlState() {
        const params = new URLSearchParams(window.location.search);
        const stateParam = params.get('state');
        try {
            return stateParam ? JSON.parse(decodeURIComponent(stateParam)) : { scores: { GD: 0, IP: 0, FT: 0, TO: 0, GA: 0, BFO: 0 } };
        } catch (e) {
            console.error("Error parsing state:", e);
            return { scores: { GD: 0, IP: 0, FT: 0, TO: 0, GA: 0, BFO: 0 } };
        }
    }

    function toggleCard(element) {
        element.classList.toggle('selected');
        updateButtonState();
    }

    function updateButtonState() {
        const selectedCards = document.querySelectorAll('.onboarding-card.selected');
        const anySelected = selectedCards.length > 0;
        const btn = document.getElementById('continue-btn');
        
        if (anySelected) {
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btn.disabled = false;
        } else {
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.disabled = true;
        }
    }

    function handleContinue() {
        const selectedCards = document.querySelectorAll('.onboarding-card.selected');
        if (selectedCards.length === 0) return;

        const state = getUrlState();
        const currentScores = { ...(state.scores || {}) };
        
        selectedCards.forEach(card => {
            const label = card.getAttribute('data-label');
            const scores = archetypeMapping[label];
            if (scores) {
                for (const [key, value] of Object.entries(scores)) {
                    currentScores[key] = (currentScores[key] || 0) + value;
                }
            }
        });

        state.scores = currentScores;

        const nextStepUrl = `step5.html?state=${encodeURIComponent(JSON.stringify(state))}`;
        window.location.href = nextStepUrl;
    }

    function handleBack() {
        window.history.back();
    }

    function handleExit() {
        window.location.href = 'index.html';
    }

    // Initialize state on load
    window.onload = () => {
        updateButtonState();
    };
</script>
