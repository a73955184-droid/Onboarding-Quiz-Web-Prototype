<script>
        // State management
        function getUrlState() {
            const params = new URLSearchParams(window.location.search);
            const stateParam = params.get('state');
            try {
                return stateParam ? JSON.parse(decodeURIComponent(stateParam)) : { scores: {} };
            } catch (e) {
                console.error('Error parsing state:', e);
                return { scores: {} };
            }
        }

        function toggleCard(element) {
            element.classList.toggle('selected');
            updateButtonVisibility();
        }

        function updateButtonVisibility() {
            const anySelected = document.querySelectorAll('.onboarding-card.selected').length > 0;
            const btn = document.getElementById('continue-btn');
            btn.disabled = !anySelected;
        }

        function saveAndContinue() {
            const selectedCards = document.querySelectorAll('.onboarding-card.selected');
            const state = getUrlState();
            
            // Start with current scores or empty if missing
            const newScores = { ...(state.scores || {}) };

            selectedCards.forEach(card => {
                const cardScores = JSON.parse(card.getAttribute('data-scores') || '{}');
                for (const [archetype, value] of Object.entries(cardScores)) {
                    newScores[archetype] = (newScores[archetype] || 0) + value;
                }
            });

            const updatedState = {
                ...state,
                scores: newScores
            };
            
            const stateString = encodeURIComponent(JSON.stringify(updatedState));
            window.location.href = `step4.html?state=${stateString}`;
        }

        // Initialize button state
        document.addEventListener('DOMContentLoaded', () => {
            updateButtonVisibility();
        });
    </script>
