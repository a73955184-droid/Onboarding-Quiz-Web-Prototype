<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AaronBux Onboarding - Step 6</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .selected-glow {
            box-shadow: 0px 0px 12px rgba(255, 214, 0, 0.25);
        }
        /* Hide scrollbar for zero-scroll intent */
        body::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            min-height: max(884px, 100dvh);
            overflow: hidden;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary": "#00363f",
                      "surface-tint": "#e9c400",
                      "surface-container-highest": "#243743",
                      "primary-fixed-dim": "#e9c400",
                      "on-secondary-fixed": "#001f25",
                      "primary-fixed": "#ffe170",
                      "on-background": "#d1e5f5",
                      "inverse-surface": "#d1e5f5",
                      "on-primary-container": "#705d00",
                      "on-tertiary-container": "#006d36",
                      "on-primary-fixed-variant": "#544600",
                      "tertiary": "#dbffde",
                      "on-error": "#690005",
                      "inverse-primary": "#705d00",
                      "error": "#ffb4ab",
                      "surface-dim": "#021520",
                      "tertiary-container": "#7af19c",
                      "surface-container-high": "#192c38",
                      "background": "#021520",
                      "on-tertiary-fixed-variant": "#005227",
                      "on-tertiary-fixed": "#00210c",
                      "surface-container": "#0e222d",
                      "on-tertiary": "#003919",
                      "surface-container-lowest": "#00101a",
                      "error-container": "#93000a",
                      "surface-container-low": "#091e29",
                      "on-primary-fixed": "#221b00",
                      "tertiary-fixed-dim": "#66dd8b",
                      "secondary-container": "#104e59",
                      "inverse-on-surface": "#20333e",
                      "on-primary": "#3a3000",
                      "surface": "#021520",
                      "on-surface": "#d1e5f5",
                      "tertiary-fixed": "#83fba5",
                      "secondary-fixed-dim": "#99cfdd",
                      "on-surface-variant": "#d0c6ab",
                      "surface-bright": "#293b47",
                      "secondary-fixed": "#b5ebf9",
                      "outline": "#999077",
                      "on-error-container": "#ffdad6",
                      "on-secondary-fixed-variant": "#104e59",
                      "primary": "#ffd600",
                      "outline-variant": "#4d4632",
                      "on-secondary-container": "#88becb",
                      "surface-variant": "#243743",
                      "secondary": "#99cfdd",
                      "primary-container": "#ffd600"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-lg": "2.5rem",
                      "stack-md": "1.5rem",
                      "stack-sm": "0.5rem",
                      "gutter": "1rem",
                      "container-max": "480px"
              },
              "fontFamily": {
                      "body-lg": ["Inter"],
                      "headline-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "label-sm": ["Inter"],
                      "label-md": ["Inter"]
              },
              "fontSize": {
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Header Section -->
<header class="fixed top-0 left-0 right-0 z-50 bg-background/80 backdrop-blur-md">
<div class="flex items-center justify-between px-6 h-14 w-full max-w-7xl mx-auto">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-headline-md text-base font-bold tracking-tight text-primary">AaronBux</span>
<span class="font-label-sm text-[10px] text-on-surface-variant uppercase tracking-wider">Step 6 of 7</span>
</div>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
<div class="absolute top-0 left-0 w-full h-[4px] bg-[#ABE1EF]/20 z-[60]">
<div class="progress-bar-fill h-full bg-[#FFD600]" style="width: 85.7%;"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-gutter pb-32 pt-20">
<div class="w-full max-w-container-max flex flex-col items-center">
<!-- Title Section -->
<div class="text-center mt-6 mb-8">
<h1 class="font-headline-lg-mobile text-2xl mb-3 text-primary">Age</h1>
<p class="text-label-md text-on-surface-variant leading-relaxed font-normal">Which age range are you in?</p>
</div>
<!-- Selection List: Grid 2-column visually implemented as stack for better mobile tappability, but user requested layout parity -->
<div class="w-full grid grid-cols-1 gap-3" id="age-range-options">
<!-- Under 25 Card -->
<button class="group w-full relative flex items-center justify-between p-5 rounded-xl bg-surface-container-low border border-white/10 text-left transition-all duration-200 active:scale-[0.98]" onclick="selectCard(this, 'Under 25')">
<span class="font-body-lg text-body-lg text-on-surface">Under 25</span>
<div class="check-icon opacity-0 w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- 25–34 Card -->
<button class="group w-full relative flex items-center justify-between p-5 rounded-xl bg-surface-container-low border border-white/10 text-left transition-all duration-200 active:scale-[0.98]" onclick="selectCard(this, '25–34')">
<span class="font-body-lg text-body-lg text-on-surface">25–34</span>
<div class="check-icon opacity-0 w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- 35–44 Card -->
<button class="group w-full relative flex items-center justify-between p-5 rounded-xl bg-surface-container-low border border-white/10 text-left transition-all duration-200 active:scale-[0.98]" onclick="selectCard(this, '35–44')">
<span class="font-body-lg text-body-lg text-on-surface">35–44</span>
<div class="check-icon opacity-0 w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- 45–54 Card -->
<button class="group w-full relative flex items-center justify-between p-5 rounded-xl bg-surface-container-low border border-white/10 text-left transition-all duration-200 active:scale-[0.98]" onclick="selectCard(this, '45–54')">
<span class="font-body-lg text-body-lg text-on-surface">45–54</span>
<div class="check-icon opacity-0 w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- 55+ Card -->
<button class="group w-full relative flex items-center justify-between p-5 rounded-xl bg-surface-container-low border border-white/10 text-left transition-all duration-200 active:scale-[0.98]" onclick="selectCard(this, '55+')">
<span class="font-body-lg text-body-lg text-on-surface">55+</span>
<div class="check-icon opacity-0 w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 w-full z-50 flex justify-between items-center px-gutter py-4 bg-surface-container max-w-container-max mx-auto border-t border-white/10 shadow-lg">
<button class="text-secondary px-4 py-2 text-label-md hover:opacity-80 transition-opacity active:scale-95 flex items-center gap-1" onclick="handleBack()">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
<span class="">Back</span>
</button>
<button class="bg-primary-container text-on-primary-container rounded-lg px-8 py-3 font-bold text-label-md hover:bg-primary-fixed-dim transition-colors active:scale-98 shadow-inner flex items-center gap-2" onclick="handleContinue()">
<span class="">Continue</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</nav>
<script>
        // State Management
        let appState = {
            scores: {
                GD: 0,
                GA: 0,
                IP: 0,
                FT: 0,
                ES: 0,
                TO: 0,
                BFO: 0
            },
            ageRange: ''
        };

        // Initialize from URL
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const stateParam = urlParams.get('state');
            
            if (stateParam) {
                try {
                    const decodedState = JSON.parse(decodeURIComponent(stateParam));
                    if (decodedState.scores) appState.scores = decodedState.scores;
                    if (decodedState.ageRange) appState.ageRange = decodedState.ageRange;
                } catch (e) {
                    console.error("Error parsing state from URL", e);
                }
            }

            if (appState.ageRange) {
                restoreSelection(appState.ageRange);
            }
        }

        function restoreSelection(val) {
            const buttons = document.querySelectorAll('#age-range-options button');
            buttons.forEach(btn => {
                const text = btn.querySelector('span').textContent.trim();
                if (text === val) {
                    applyStyles(btn);
                }
            });
        }

        function applyStyles(element) {
            // Reset all
            const allCards = document.querySelectorAll('#age-range-options button');
            allCards.forEach(card => {
                card.classList.remove('selected-glow', 'border-2', 'border-primary');
                card.classList.add('border', 'border-white/10');
                const icon = card.querySelector('.check-icon');
                if (icon) {
                    icon.classList.remove('opacity-100');
                    icon.classList.add('opacity-0');
                }
            });

            // Apply to target
            element.classList.remove('border', 'border-white/10');
            element.classList.add('selected-glow', 'border-2', 'border-primary');
            const selectedIcon = element.querySelector('.check-icon');
            if (selectedIcon) {
                selectedIcon.classList.remove('opacity-0');
                selectedIcon.classList.add('opacity-100');
            }
        }

        function selectCard(element, value) {
            applyStyles(element);
            appState.ageRange = value;
        }

        function handleContinue() {
            if (!appState.ageRange) {
                alert('Please select your age range to continue.');
                return;
            }

            // Create a copy of scores to update
            const updatedScores = { ...appState.scores };

            // Updated Multipliers Logic based on requirements
            switch (appState.ageRange) {
                case 'Under 25':
                    // Under 25: Multiply existing scores for TO, GA, and FT by 1.2
                    updatedScores.TO *= 1.2;
                    updatedScores.GA *= 1.2;
                    updatedScores.FT *= 1.2;
                    break;
                case '25–34':
                    // 25–34: Multiply existing scores for ES, FT, and GA by 1.1
                    updatedScores.ES *= 1.1;
                    updatedScores.FT *= 1.1;
                    updatedScores.GA *= 1.1;
                    break;
                case '35–44':
                    // Neutral - no change specified
                    break;
                case '45–54':
                    // 45–54: BFO x1.1, IP x1.1
                    updatedScores.BFO *= 1.1;
                    updatedScores.IP *= 1.1;
                    break;
                case '55+':
                    // 55+: IP x1.3, TO x0.6
                    updatedScores.IP *= 1.3;
                    updatedScores.TO *= 0.6;
                    break;
            }

            const finalState = {
                ...appState,
                scores: updatedScores
            };

            const stateString = encodeURIComponent(JSON.stringify(finalState));
            // Navigate to next step (Step 7)
            window.location.href = `step7.html?state=${stateString}`;
        }

        function handleBack() {
            window.history.back();
        }

        // Initialize on load
        window.onload = init;
    </script>
</body></html>
