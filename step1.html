<span class="material-symbols-outlined" data-icon="close">close</span>

<p class="font-body-md text-sm text-on-surface-variant leading-relaxed">Which of these best describes your current investment setup?</p>
</div>
<!-- 2-column, 4-row grid -->

<!-- Data weights: mapping to new required logic -->
<button class="option-card onboarding-card relative group flex flex-col text-left p-3 rounded-xl border border-white/10 bg-surface-container transition-all duration-200 active:scale-[0.98] h-24" data-value="broad_etf" data-weights='{"GD": 2}' onclick="toggleSelection(this)" type="button">

<div class="check-icon absolute bottom-2 right-2 opacity-0 scale-50 transition-all duration-200">
<span class="material-symbols-outlined text-[#ffd600] text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<button class="option-card onboarding-card relative group flex flex-col text-left p-3 rounded-xl border border-white/10 bg-surface-container transition-all duration-200 active:scale-[0.98] h-24" data-value="retirement" data-weights='{"IP": 2}' onclick="toggleSelection(this)" type="button">

<div class="check-icon absolute bottom-2 right-2 opacity-0 scale-50 transition-all duration-200">

<button class="option-card onboarding-card relative group flex flex-col text-left p-3 rounded-xl border border-white/10 bg-surface-container transition-all duration-200 active:scale-[0.98] h-24" data-value="mix_stocks" data-weights='{"GA": 1, "FT": 1}' onclick="toggleSelection(this)" type="button">

<span class="material-symbols-outlined text-[#ffd600] text-lg" style="font-variation-settings: 'FILL' 1;">check_circle</span>

</button>
<button class="option-card onboarding-card relative group flex flex-col text-left p-3 rounded-xl border border-white/10 bg-surface-container transition-all duration-200 active:scale-[0.98] h-24" data-value="sectors" data-weights='{"GA": 2, "TO": 1}' onclick="toggleSelection(this)" type="button">

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/20 z-50">

<!-- Back Button -->

<span class="material-symbols-outlined mr-2 group-hover:-translate-x-1 transition-transform" data-icon="chevron_left">chevron_left</span>
<span class="font-label-sm text-label-sm">Back</span>
</button>
<!-- Continue Button (Primary) -->
<button class="flex items-center justify-center bg-primary-container text-on-primary-container rounded-lg px-8 py-3 font-bold hover:brightness-110 transition-all active:scale-[0.98] shadow-lg shadow-primary-container/20 group disabled:opacity-35" disabled="" id="continue-btn">
<span class="font-label-sm text-label-sm">Continue</span>
<span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>

<script>
        function updateContinueButton() {
            const selectedCount = document.querySelectorAll('.onboarding-card.selected').length;
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.disabled = (selectedCount === 0);
        }

        function toggleSelection(element) {
            element.classList.toggle('selected');
            
            // Micro-interaction feedback
            element.style.transform = 'scale(0.96)';
            setTimeout(() => {
                element.style.transform = '';
            }, 100);

            updateContinueButton();
        }

        // Entrance animation and initialization
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.onboarding-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100 + (index * 40));
            });

            // Initialize button state
            updateContinueButton();
        });

        // Handle Continue Click (URL State Management)
        document.getElementById('continue-btn').addEventListener('click', () => {
            const selectedCards = document.querySelectorAll('.onboarding-card.selected');
            
            // 1. Initialize empty scores object
            const scores = {GD:0, GA:0, IP:0, FT:0, ES:0, TO:0, BFO:0};

            // 2. Calculate scores
            selectedCards.forEach(card => {
                const weights = JSON.parse(card.getAttribute('data-weights'));
                for (const [archetype, value] of Object.entries(weights)) {
                    if (scores.hasOwnProperty(archetype)) {
                        scores[archetype] += value;
                    }
                }
            });

            // 3. Serialize the scores object (URL-encoded JSON)
            const stateString = encodeURIComponent(JSON.stringify({
                scores: scores,
                step: 1
            }));

            // 4. Update navigation to link to Step 2 with the scores as a URL parameter
            console.log("Navigating to Step 2 with state:", scores);
            window.location.href = `step2.html?state=${stateString}`;
        });
    </script>
