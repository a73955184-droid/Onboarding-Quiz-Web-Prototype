<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AaronBux - Goals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <button class="btn btn-secondary" id="backBtn" type="button">Back</button>
        <div style="text-align:center">
          <div class="brand">AaronBux</div>
          <div class="step-label">Step 8 of 8</div>
        </div>
        <div class="step-label">Behavioral onboarding</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
    </header>
    <main class="main">
      <section class="panel card">
        <div class="eyebrow">Goal layer</div>
        <h2>What are you optimizing your investing system for right now?</h2>
        <p class="lead">Goals refine the profile. They should not override the behavioral pattern from earlier screens.</p>
        <div id="options" class="screen-grid"></div>
      </section>
    </main>
    <nav class="bottom-nav">
      <div class="bottom-inner">
        <span class="step-label">Choose up to two goals</span>
        <button class="btn btn-primary" id="continueBtn" type="button">Continue</button>
      </div>
    </nav>
  </div>
  <script src="app.js"></script>

  <script>
    setupOptionScreen({
      title: "Goals",
      screenKey: "goals",
      next: "recommendation.html",
      min: 1,
      max: 2,
      type: "normal",
      options: [{"id": "wealth", "label": "Long-term wealth", "helper": "Compounding and diversified wealth-building.", "scores": {"GD": 2, "BFO": 1}}, {"id": "fi", "label": "Financial independence", "helper": "Optimization with some control.", "scores": {"FT": 2, "TO": 1}}, {"id": "confidence", "label": "More confidence", "helper": "Validation and clarity.", "scores": {"BFO": 2}}, {"id": "income", "label": "Income generation", "helper": "Yield and stability.", "scores": {"IP": 3}}, {"id": "preservation", "label": "Capital preservation", "helper": "Protect what is already built.", "scores": {"IP": 3, "GD": 1}}, {"id": "highergrowth", "label": "Higher growth", "helper": "Growth and upside.", "scores": {"GA": 3, "TO": 1}}]
    });
  </script>
</body>
</html>
