            color: #d1e5f5;

        .onboarding-card {
            background-color: #0e222d;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0px 8px 24px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .onboarding-card.selected {

            box-shadow: 0px 0px 15px rgba(255, 214, 0, 0.2), 0px 8px 24px rgba(0,0,0,0.4);
            transform: translateY(-2px);

            color: #d0c6ab !important;

<body class="min-h-screen flex flex-col overflow-hidden">
<!-- Progress Indicator -->
<div class="fixed top-0 left-0 w-full h-1 bg-secondary/10 z-[60]">
<div class="h-full bg-primary-container progress-bar-fill"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-background/80 backdrop-blur-md border-b border-white/5">
<div class="flex items-center justify-between px-6 h-14 w-full max-w-7xl mx-auto">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-150" onclick="window.history.back()">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-display text-lg font-bold text-white tracking-tight">AaronBux</span>
<span class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-0.5">Step 2 of 7</span>
</div>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow w-full max-w-[480px] mx-auto px-gutter pb-[120px] pt-20 overflow-y-auto">
<!-- Header Section -->
<section class="mb-stack-lg text-center">
<h1 class="font-display text-2xl text-primary font-normal mb-3">Investor Concerns</h1>
<p class="font-body-md text-sm text-on-surface-variant leading-relaxed px-4">
            What kinds of questions or uncertainties have been coming up about your current portfolio?
        </p>
</section>
<!-- Grid Layout: 2x4 Grid -->
<div class="grid grid-cols-2 gap-3 w-full" id="selection-grid">
<!-- Card 1 -->
<button class="onboarding-card group text-left p-3 rounded-xl flex flex-col justify-between h-24 active:scale-95 transition-all" data-label="setup_quality" data-weights='{"GD": 2, "IP": 1}' onclick="toggleCard(this)">
<span class="font-label-sm text-[13px] text-on-surface group-hover:text-primary transition-colors leading-snug">Is my current setup actually good long term?</span>
<div class="flex justify-end opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary-container text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card 2 -->
<button class="onboarding-card group text-left p-3 rounded-xl flex flex-col justify-between h-24 active:scale-95 transition-all" data-label="diversification_need" data-weights='{"FT": 2, "GA": 1}' onclick="toggleCard(this)">
<span class="font-label-sm text-[13px] text-on-surface group-hover:text-primary transition-colors leading-snug">Should I diversify beyond basic ETFs?</span>
<div class="flex justify-end opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary-container text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card 3 -->
<button class="onboarding-card group text-left p-3 rounded-xl flex flex-col justify-between h-24 active:scale-95 transition-all" data-label="complexity_worry" data-weights='{"GD": 2, "BFO": 1}' onclick="toggleCard(this)">
<span class="font-label-sm text-[13px] text-on-surface group-hover:text-primary transition-colors leading-snug">Am I overcomplicating my portfolio?</span>
<div class="flex justify-end opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary-container text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card 4 -->

<span class="font-label-sm text-[13px] text-on-surface group-hover:text-primary transition-colors leading-snug">Should I stay passive or become more intentional?</span>
<div class="flex justify-end opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary-container text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card 5 -->

<span class="font-label-sm text-[13px] text-on-surface group-hover:text-primary transition-colors leading-snug">I want to understand why some outperform others</span>

<span class="font-label-sm text-[13px] text-on-surface group-hover:text-primary transition-colors leading-snug">I’m unsure when changes actually make sense</span>

<span class="font-label-sm text-[13px] text-on-surface group-hover:text-primary transition-colors leading-snug">I want stronger growth without gambling</span>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-surface-container/95 backdrop-blur-lg border-t border-white/10 shadow-[0_-8px_24px_rgba(0,0,0,0.4)] px-6 py-4 flex justify-between items-center z-50 h-20">
<button class="flex items-center justify-center text-secondary hover:brightness-110 transition-all active:scale-95 group" onclick="window.history.back()">
<span class="material-symbols-outlined mr-1 group-hover:-translate-x-1 transition-transform" data-icon="chevron_left">chevron_left</span>
<span class="font-label-md text-label-md">Back</span>
</button>
<button class="flex items-center justify-center bg-white/5 text-white/20 rounded-xl px-8 py-3.5 font-bold transition-all duration-300 shadow-lg cursor-not-allowed disabled:opacity-50" disabled="" id="continue-btn" onclick="saveAndContinue()">
<span class="font-label-md text-label-md mr-1">Continue</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</nav>
<script>
    function getAppStateFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const stateParam = urlParams.get('state');
        if (stateParam) {
            try {
                return JSON.parse(decodeURIComponent(stateParam));
            } catch (e) {
                console.error("Error parsing state from URL", e);
            }
        }
        return { scores: { BFO: 0, GD: 0, TO: 0, IP: 0, GA: 0, FT: 0 } };
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Entrance animation
        document.querySelectorAll('.onboarding-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(12px)';
            setTimeout(() => {
                card.style.transition = 'all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100 + (index * 40));
        });
    });

    function toggleCard(element) {
        element.classList.toggle('selected');
        
        // Micro-feedback
        element.style.transform = 'scale(0.97)';
        setTimeout(() => element.style.transform = '', 100);
        
        updateButtonState();
    }

    function updateButtonState() {
        const selectedCards = document.querySelectorAll('.onboarding-card.selected');
        const anySelected = selectedCards.length > 0;
        const btn = document.getElementById('continue-btn');
        
        if (anySelected) {
            btn.classList.remove('bg-white/5', 'text-white/20', 'cursor-not-allowed');
            btn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-[0_4px_12px_rgba(255,214,0,0.3)]');
            btn.disabled = false;
        } else {
            btn.classList.add('bg-white/5', 'text-white/20', 'cursor-not-allowed');
            btn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-[0_4px_12px_rgba(255,214,0,0.3)]');
            btn.disabled = true;
        }
    }

    function saveAndContinue() {
        const selectedCards = document.querySelectorAll('.onboarding-card.selected');
        if (selectedCards.length === 0) return;

        const state = getAppStateFromUrl();
        
        selectedCards.forEach(card => {
            const weights = JSON.parse(card.getAttribute('data-weights'));
            for (const [key, value] of Object.entries(weights)) {
                state.scores[key] = (state.scores[key] || 0) + value;
            }
        });

        const nextStateStr = encodeURIComponent(JSON.stringify(state));
        window.location.href = `step3.html?state=${nextStateStr}`;
    }
</script>
</body></html>
