<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AaronBux - Current Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <button class="btn btn-secondary" id="backBtn" type="button">Back</button>
        <div style="text-align:center">
          <div class="brand">AaronBux</div>
          <div class="step-label">Step 1 of 8</div>
        </div>
        <div class="step-label">Behavioral onboarding</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:12.5%"></div></div>
    </header>
    <main class="main">
      <section class="panel card">
        <div class="eyebrow">Current setup</div>
        <h2>What does your investing setup already look like?</h2>
        <p class="lead">Start with what you already do. AaronBux assumes you may already be investing and trying to make sense of your next step.</p>
        <div id="options" class="screen-grid"></div>
      </section>
    </main>
    <nav class="bottom-nav">
      <div class="bottom-inner">
        <span class="step-label">Choose one option</span>
        <button class="btn btn-primary" id="continueBtn" type="button">Continue</button>
      </div>
    </nav>
  </div>
  <script src="app.js"></script>

  <script>
    setupOptionScreen({
      title: "Current Setup",
      screenKey: "setup",
      next: "screen2.html",
      min: 1,
      max: 1,
      type: "normal",
      options: [{"id": "etfs", "label": "I mostly use ETFs/index funds", "helper": "You have a simple passive foundation.", "scores": {"GD": 3, "ES": 2}}, {"id": "robo", "label": "I use a robo-advisor", "helper": "You outsource most allocation decisions.", "scores": {"ES": 3, "GD": 2}}, {"id": "stocks", "label": "I pick some stocks myself", "helper": "You are already experimenting with active choices.", "scores": {"FT": 2, "TO": 1}}, {"id": "communities", "label": "I follow investing communities/content regularly", "helper": "Reddit, YouTube, newsletters, Discord, or similar.", "scores": {"FT": 1, "TO": 2, "GA": 1}}, {"id": "experimenting", "label": "I’m experimenting beyond basic investing", "helper": "You are moving beyond simple ETF allocation.", "scores": {"GA": 3, "TO": 2}}]
    });
  </script>
</body>
</html>
